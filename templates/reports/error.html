{% extends "base.html" %}

{% block title %}خطا | کدال اکسپرت{% endblock %}

{% block content %}
<div class="container" style="display:flex;justify-content:center;padding-top:4rem;">
    <div class="fin-error-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48" style="color:#f87171;margin-bottom:1rem;">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <h2 style="font-size:1.1rem;margin-bottom:0.5rem;">{{ error_title }}</h2>
        <p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.8;">{{ error_msg }}</p>
        <br>
        <a href="{% url 'reports' symbol=symbol %}" class="refresh-btn" style="display:inline-flex;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            بازگشت به گزارش‌ها
        </a>
    </div>
</div>
{% endblock %}
