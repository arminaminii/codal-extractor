{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}کدال اکسپرت{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #040811;
            --bg-primary: #0a0f1e;
            --bg-card: rgba(15, 23, 42, 0.7);
            --bg-glass: rgba(15, 23, 42, 0.5);
            --border-glass: rgba(56, 189, 248, 0.12);
            --neon-cyan: #22d3ee;
            --neon-cyan-dim: rgba(34, 211, 238, 0.15);
            --neon-purple: #a78bfa;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: 0.2s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Sticky Navigation */
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(4, 8, 17, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.25rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            color: var(--neon-cyan);
            flex-shrink: 0;
        }

        .logo-text h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .logo-text span {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            list-style: none;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color var(--transition), background var(--transition);
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: var(--neon-cyan-dim);
        }

        .nav-links a.active {
            color: var(--neon-cyan);
            background: var(--neon-cyan-dim);
        }

        .nav-links a svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Main Content */
        .site-main {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* Footer */
        .site-footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border-glass);
            background: rgba(4, 8, 17, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .footer-text a {
            color: var(--neon-cyan);
            text-decoration: none;
            transition: opacity var(--transition);
        }

        .footer-text a:hover {
            opacity: 0.8;
        }

        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color var(--transition);
        }

        .footer-link:hover {
            color: var(--neon-cyan);
        }

        .footer-link svg {
            width: 16px;
            height: 16px;
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Animated Background Grid -->
    <div class="bg-grid" aria-hidden="true"></div>

    <!-- Navigation -->
    <nav class="site-nav">
        <div class="nav-inner">
            <div class="logo-section">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 17 9 11 13 15 21 5"/>
                    <polyline points="17 5 21 5 21 9"/>
                </svg>
                <div class="logo-text">
                    <h1>کدال اکسپرت</h1>
                    <span>استخراج لحظه‌ای اطلاعیه‌های بورسی</span>
                </div>
            </div>
            <ul class="nav-links">
                <li>
                    <a href="/" class="{% if nav_page == 'home' %}active{% endif %}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        انتخاب شرکت
                    </a>
                </li>
                <li>
                    <a href="#" class="{% if nav_page == 'reports' %}active{% endif %}" id="reportsNavLink" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        گزارش‌ها
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-text">کدال اکسپرت &copy; ۱۴۰۴ &mdash; داده‌ها از <a href="https://codal.ir" target="_blank" rel="noopener">codal.ir</a></p>
            <a href="https://github.com" target="_blank" rel="noopener" class="footer-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                GitHub
            </a>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
